<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>업체 프로필 | Vibespace</title>
  <link rel="icon" href="favicon.svg">
  <style>
    :root {
      --primary: #5B6BF8;
      --primary-bg: #eef1ff;
      --font: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      --bg: #f5f6fa;
      --card: #fff;
      --text: #111;
      --text2: #555;
      --text3: #aaa;
      --border: #eaecf0;
      --radius: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; }
    a { text-decoration:none; }

    /* ── Header ── */
    .page-header {
      background:#fff; border-bottom:1px solid var(--border);
      padding:14px 20px; display:flex; align-items:center; gap:12px;
      position:sticky; top:0; z-index:100;
    }
    .back-btn {
      width:36px; height:36px; border-radius:50%; border:none;
      background:#f5f6fa; cursor:pointer;
      display:flex; align-items:center; justify-content:center; color:#555;
      flex-shrink:0;
    }
    .header-logo { font-size:16px; font-weight:800; color:#111; }
    .header-logo span { color:var(--primary); }
    .header-share {
      margin-left:auto; width:36px; height:36px; border-radius:50%; border:none;
      background:#f5f6fa; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#555;
    }

    /* ── App Banner ── */
    .app-banner {
      background:var(--primary-bg); padding:11px 20px;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .app-banner-text { font-size:13px; color:var(--primary); font-weight:600; }
    .app-banner-btn {
      font-size:12px; font-weight:700; color:#fff; background:var(--primary);
      border:none; border-radius:20px; padding:6px 14px; cursor:pointer; font-family:var(--font);
      flex-shrink:0; white-space:nowrap;
    }

    /* ── Hero ── */
    .hero { background:#fff; padding:24px 20px 20px; }
    .hero-badges { display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
    .badge {
      font-size:12px; font-weight:600; padding:3px 11px; border-radius:20px;
      display:inline-flex; align-items:center; gap:4px;
    }
    .badge-cat { background:var(--cat-bg,#eee); color:var(--cat-color,#888); }
    .badge-unverified { background:#f0f0f0; color:#999; }
    .badge-verified { background:#d1fae5; color:#059669; }
    .badge-premium { background:linear-gradient(135deg,#f59e0b,#f97316); color:#fff; }
    .hero-name { font-size:28px; font-weight:800; color:#111; line-height:1.2; margin-bottom:10px; }
    .hero-area { font-size:14px; color:#888; display:flex; align-items:center; gap:5px; }
    .hero-divider { height:1px; background:var(--border); margin:18px 0; }
    .stats-row { display:flex; align-items:center; gap:0; }
    .stat-item { flex:1; text-align:center; }
    .stat-item + .stat-item { border-left:1px solid var(--border); }
    .stat-value { font-size:22px; font-weight:800; color:#111; line-height:1; margin-bottom:4px; }
    .stat-value.primary { color:var(--primary); }
    .stat-label { font-size:12px; color:#aaa; }

    /* ── Photos ── */
    .section-divider { height:8px; background:var(--bg); }
    .section { padding:22px 20px; background:#fff; }
    .section-title {
      font-size:12px; font-weight:700; color:#aaa; letter-spacing:0.8px;
      text-transform:uppercase; margin-bottom:14px;
    }
    .photos-scroll {
      display:flex; gap:10px; overflow-x:auto; scroll-snap-type:x mandatory;
      -webkit-overflow-scrolling:touch; scrollbar-width:none;
      margin:0 -20px; padding:0 20px 4px;
    }
    .photos-scroll::-webkit-scrollbar { display:none; }
    .photo-thumb {
      width:180px; height:135px; border-radius:12px; object-fit:cover;
      flex-shrink:0; scroll-snap-align:start; background:#f0f0f0; display:block;
    }
    .photo-placeholder {
      width:180px; height:135px; border-radius:12px;
      background:#f5f6fa; flex-shrink:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:8px; color:#ccc;
    }
    .photo-placeholder span { font-size:12px; }

    /* ── Info Card ── */
    .info-list { display:flex; flex-direction:column; gap:14px; }
    .info-row { display:flex; align-items:center; gap:14px; }
    .info-icon {
      width:40px; height:40px; border-radius:12px; background:var(--primary-bg);
      display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--primary);
    }
    .info-label { font-size:12px; color:#aaa; margin-bottom:3px; }
    .info-value { font-size:15px; font-weight:600; color:#111; }
    .info-link { font-size:15px; font-weight:600; color:var(--primary); }

    /* ── Description ── */
    .desc-text { font-size:15px; color:#444; line-height:1.75; }

    /* ── Review Links ── */
    .review-link-row {
      display:flex; align-items:center; gap:12px; padding:14px 16px;
      background:#f8f9fc; border-radius:12px; margin-bottom:8px;
      text-decoration:none; color:#111;
    }
    .review-link-row:last-child { margin-bottom:0; }
    .review-icon {
      width:34px; height:34px; border-radius:9px; background:var(--primary-bg);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      font-size:16px;
    }
    .review-link-name { font-size:14px; font-weight:600; flex:1; }
    .review-arrow { color:#ccc; font-size:16px; }

    /* ── Premium Teaser ── */
    .premium-card {
      background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);
      border-radius:var(--radius); padding:22px; color:#fff; position:relative; overflow:hidden;
    }
    .premium-badge-inner {
      display:inline-flex; align-items:center; gap:5px;
      background:rgba(245,158,11,.2); border:1px solid rgba(245,158,11,.35);
      color:#f59e0b; font-size:11px; font-weight:700; padding:4px 12px; border-radius:20px;
      margin-bottom:12px; letter-spacing:0.5px;
    }
    .premium-title { font-size:17px; font-weight:800; margin-bottom:8px; }
    .premium-desc { font-size:13px; color:rgba(255,255,255,.55); line-height:1.7; }
    .premium-features {
      display:flex; flex-wrap:wrap; gap:6px; margin-top:14px;
    }
    .premium-feature {
      font-size:12px; background:rgba(255,255,255,.1); border-radius:20px;
      padding:4px 12px; color:rgba(255,255,255,.7);
    }
    .premium-lock { position:absolute; right:20px; bottom:16px; font-size:40px; opacity:.12; }

    /* ── CTA ── */
    .cta-section {
      padding:20px; padding-bottom:calc(20px + env(safe-area-inset-bottom));
      background:#fff;
    }
    .cta-btn {
      width:100%; padding:17px; background:var(--primary); color:#fff;
      border:none; border-radius:14px; font-size:16px; font-weight:700;
      font-family:var(--font); cursor:pointer; letter-spacing:-0.3px;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }

    /* ── Loading / Error ── */
    .skeleton {
      background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);
      background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:10px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .error-state { padding:60px 20px; text-align:center; }
    .error-icon { font-size:52px; margin-bottom:16px; }
    .error-title { font-size:18px; font-weight:700; margin-bottom:8px; }
    .error-desc { font-size:14px; color:#888; line-height:1.6; }
    .error-back {
      display:inline-block; margin-top:24px; padding:12px 28px;
      background:var(--primary); color:#fff; border-radius:12px;
      font-weight:700; font-size:14px;
    }

    /* Photo modal */
    .photo-modal {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.92);
      z-index:9999; align-items:center; justify-content:center;
    }
    .photo-modal.active { display:flex; }
    .photo-modal img { max-width:100vw; max-height:100vh; object-fit:contain; }
    .photo-modal-close {
      position:absolute; top:20px; right:20px; width:40px; height:40px;
      border-radius:50%; background:rgba(255,255,255,.2); border:none; color:#fff;
      font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    }
  </style>
</head>
<body>

<!-- Photo Modal -->
<div class="photo-modal" id="photo-modal" onclick="closePhotoModal()">
  <button class="photo-modal-close" onclick="closePhotoModal()">✕</button>
  <img id="photo-modal-img" src="" alt="">
</div>

<!-- Header -->
<header class="page-header">
  <button class="back-btn" onclick="location.href='https://vibespacekorea.com'" aria-label="뒤로">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
  </button>
  <div class="header-logo">Vibe<span>space</span></div>
  <button class="header-share" onclick="shareContractor()" aria-label="공유">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
    </svg>
  </button>
</header>

<!-- App Banner (external visitors) -->
<div class="app-banner" id="app-banner" style="display:none">
  <span class="app-banner-text">📐 인테리어 공사를 체계적으로 계획하세요</span>
  <button class="app-banner-btn" onclick="window.open('https://vibespacekorea.com','_blank')">앱 열기</button>
</div>

<!-- Main Content -->
<main id="main-content">
  <!-- Loading Skeleton -->
  <div id="loading-state" style="padding:24px 20px;background:#fff;">
    <div class="skeleton" style="height:28px;width:60%;margin-bottom:14px;"></div>
    <div class="skeleton" style="height:36px;width:80%;margin-bottom:8px;"></div>
    <div class="skeleton" style="height:20px;width:40%;"></div>
    <div style="height:18px;"></div>
    <div class="skeleton" style="height:1px;margin-bottom:18px;"></div>
    <div style="display:flex;gap:10px;">
      <div class="skeleton" style="height:180px;width:180px;border-radius:12px;flex-shrink:0;"></div>
      <div class="skeleton" style="height:180px;width:180px;border-radius:12px;flex-shrink:0;"></div>
    </div>
  </div>
</main>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyDq7zt2cyE3dV--wfGjqJYgw8Qt1kJVUdA",
    authDomain: "vibespace-b2329.firebaseapp.com",
    projectId: "vibespace-b2329",
    storageBucket: "vibespace-b2329.firebasestorage.app",
    messagingSenderId: "293342215882",
    appId: "1:293342215882:web:36637699126e9de805fe33"
  };

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  const CAT_COLORS = {
    전기:'#f59e0b', 설비:'#3b82f6', 타일:'#8b5cf6', 도배:'#10b981',
    청소:'#06b6d4', 마루:'#f97316', 페인트:'#ec4899', 욕실:'#14b8a6',
    철거:'#ef4444', 목공:'#a16207', 샷시:'#64748b', 가구:'#7c3aed', 기타:'#6b7280'
  };

  let _contractor = null;

  async function init() {
    try { firebase.initializeApp(FIREBASE_CONFIG); }
    catch(e) { if(e.code!=='app/duplicate-app') { showError('초기화 실패'); return; } }

    const db = firebase.firestore();
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    if (!id) { showError('업체 ID가 없습니다.'); return; }

    // Show banner if from external
    if (!document.referrer || !document.referrer.includes(location.hostname)) {
      document.getElementById('app-banner').style.display = 'flex';
    }

    try {
      const snap = await db.collection('vb_contractors').doc(id).get();
      if (!snap.exists) { showError('등록되지 않은 업체입니다.'); return; }
      _contractor = { id: snap.id, ...snap.data() };
      renderContractor(_contractor);
    } catch(e) {
      showError('정보를 불러올 수 없습니다.<br>' + esc(e.message));
    }
  }

  function renderContractor(c) {
    document.title = c.name + ' | Vibespace';

    const catColor = CAT_COLORS[c.category] || '#888';
    const catBg = catColor + '20';

    // Badge
    const verBadge = c.isPremium
      ? `<span class="badge badge-premium">⭐ 프리미엄</span>`
      : c.isVerified
        ? `<span class="badge badge-verified">✓ 인증</span>`
        : `<span class="badge badge-unverified">미인증</span>`;

    // Photos
    const photos = Array.isArray(c.photos) ? c.photos.filter(Boolean) : [];
    const photosHtml = photos.length
      ? photos.map((url,i) =>
          `<img src="${esc(url)}" class="photo-thumb" alt="${esc(c.name)} 사진${i+1}" loading="lazy"
            onclick="openPhotoModal('${esc(url)}')"
            onerror="this.parentElement&&this.remove()" style="cursor:zoom-in;">`
        ).join('')
      : `<div class="photo-placeholder">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>등록된 사진 없음</span>
        </div>`;

    // Stats
    const rating = Number(c.rating)||0;
    const reviewCount = Number(c.reviews)||0;
    const linkCount = (c.reviewLinks||[]).filter(Boolean).length;
    const hasStats = rating||reviewCount||linkCount;
    const stars = rating ? '★'.repeat(Math.min(5,Math.round(rating))) + '☆'.repeat(Math.max(0,5-Math.round(rating))) : '';

    const statsHtml = hasStats ? `
      <div class="hero-divider"></div>
      <div class="stats-row">
        ${rating ? `<div class="stat-item"><div class="stat-value">${rating.toFixed(1)}</div><div style="color:#f59e0b;font-size:11px;margin-bottom:4px;">${stars}</div><div class="stat-label">평점</div></div>` : ''}
        ${reviewCount ? `<div class="stat-item"><div class="stat-value">${reviewCount}</div><div class="stat-label">후기수</div></div>` : ''}
        ${linkCount ? `<div class="stat-item"><div class="stat-value primary">${linkCount}</div><div class="stat-label">후기링크</div></div>` : ''}
      </div>` : '';

    // Review links
    const reviewLinks = (c.reviewLinks||[]).filter(Boolean);
    const reviewLinksHtml = reviewLinks.map((url,i) => {
      let icon='🔗', name=`후기 ${i+1}`;
      if(url.includes('naver.me')||url.includes('naver.com')){icon='🟢';name=`네이버 후기 ${i+1}`;}
      else if(url.includes('daangn')){icon='🥕';name=`당근마켓 후기 ${i+1}`;}
      else if(url.includes('kakao')){icon='🟡';name=`카카오 후기 ${i+1}`;}
      else if(url.includes('google')){icon='🔵';name=`구글 후기 ${i+1}`;}
      return `<a href="${esc(url)}" target="_blank" rel="noopener" class="review-link-row">
        <div class="review-icon">${icon}</div>
        <span class="review-link-name">${name}</span>
        <span class="review-arrow">↗</span>
      </a>`;
    }).join('');

    // Contact
    const hasContact = c.phone || c.sourceUrl || c.contactEmail;
    const contactHtml = hasContact ? `
      <div class="info-list">
        ${c.phone ? `<div class="info-row">
          <div class="info-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.63A2 2 0 012 .18h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.09-1.09a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92z"/></svg></div>
          <div>
            <div class="info-label">전화번호</div>
            <a href="tel:${esc(c.phone)}" class="info-link">${esc(c.phone)}</a>
          </div>
        </div>` : ''}
        ${c.contactEmail ? `<div class="info-row">
          <div class="info-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
          <div>
            <div class="info-label">이메일</div>
            <a href="mailto:${esc(c.contactEmail)}" class="info-link">${esc(c.contactEmail)}</a>
          </div>
        </div>` : ''}
        ${c.sourceUrl ? `<div class="info-row">
          <div class="info-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></div>
          <div>
            <div class="info-label">홈페이지</div>
            <a href="${esc(c.sourceUrl)}" target="_blank" rel="noopener" class="info-link">방문하기 ↗</a>
          </div>
        </div>` : ''}
      </div>` : `<div style="color:#aaa;font-size:14px;text-align:center;padding:6px 0;">연락처 정보가 없습니다</div>`;

    const html = `
      <!-- Hero -->
      <div class="hero">
        <div class="hero-badges">
          <span class="badge badge-cat" style="--cat-bg:${catBg};--cat-color:${catColor};">${esc(c.category)}</span>
          ${verBadge}
        </div>
        <h1 class="hero-name">${esc(c.name)}</h1>
        <div class="hero-area">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${esc(c.area || '지역 미설정')}
        </div>
        ${statsHtml}
      </div>

      <!-- Photos -->
      <div class="section-divider"></div>
      <div class="section">
        <div class="section-title">사진</div>
        <div class="photos-scroll">${photosHtml}</div>
      </div>

      <!-- Contact -->
      <div class="section-divider"></div>
      <div class="section">
        <div class="section-title">연락처</div>
        ${contactHtml}
      </div>

      ${c.description ? `
      <!-- Description -->
      <div class="section-divider"></div>
      <div class="section">
        <div class="section-title">업체 소개</div>
        <p class="desc-text">${esc(c.description).replace(/\n/g,'<br>')}</p>
      </div>` : ''}

      ${reviewLinksHtml ? `
      <!-- Review Links -->
      <div class="section-divider"></div>
      <div class="section">
        <div class="section-title">후기 링크</div>
        ${reviewLinksHtml}
      </div>` : ''}

      <!-- Premium Teaser -->
      <div class="section-divider"></div>
      <div class="section">
        <div class="premium-card">
          <div class="premium-badge-inner">⭐ PREMIUM</div>
          <div class="premium-title">프리미엄 업체 혜택</div>
          <div class="premium-desc">더 많은 고객에게 노출되고 신뢰도를 높이세요.</div>
          <div class="premium-features">
            <span class="premium-feature">인증 뱃지</span>
            <span class="premium-feature">상단 노출</span>
            <span class="premium-feature">포트폴리오</span>
            <span class="premium-feature">견적 연결</span>
            <span class="premium-feature">준비 중</span>
          </div>
          <div class="premium-lock">🔒</div>
        </div>
      </div>

      <!-- CTA -->
      <div class="cta-section">
        <button class="cta-btn" onclick="window.open('https://vibespacekorea.com','_blank')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Vibespace로 공사 계획 시작하기
        </button>
      </div>
    `;

    document.getElementById('loading-state').remove();
    document.getElementById('main-content').innerHTML = html;
  }

  function showError(msg) {
    document.getElementById('loading-state').remove();
    document.getElementById('main-content').innerHTML = `
      <div class="error-state">
        <div class="error-icon">🔍</div>
        <div class="error-title">업체를 찾을 수 없습니다</div>
        <div class="error-desc">${msg}</div>
        <a href="https://vibespacekorea.com" class="error-back">홈으로 돌아가기</a>
      </div>`;
  }

  function openPhotoModal(url) {
    document.getElementById('photo-modal-img').src = url;
    document.getElementById('photo-modal').classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closePhotoModal() {
    document.getElementById('photo-modal').classList.remove('active');
    document.body.style.overflow = '';
  }

  function shareContractor() {
    const url = location.href;
    const name = _contractor ? _contractor.name : '업체';
    if (navigator.share) {
      navigator.share({ title: name + ' | Vibespace', url });
    } else {
      navigator.clipboard?.writeText(url);
      alert('링크가 복사되었습니다!');
    }
  }

  init();
</script>
</body>
</html>
