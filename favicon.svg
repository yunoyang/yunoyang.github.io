<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: blue rounded square -->
  <rect width="64" height="64" rx="16" fill="#3176ff"/>

  <!-- Subtle inner gradient overlay -->
  <rect width="64" height="64" rx="16" fill="url(#grad)" opacity="0.25"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#3176ff"/>
    </linearGradient>
  </defs>

  <!-- V shape: bold, slightly architectural with floor-plan feel -->
  <!-- Two angled lines meeting at center bottom -->
  <path d="M13 16 L32 46 L51 16"
        stroke="white"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Small horizontal accent line at top — suggests a "space/room" -->
  <line x1="13" y1="16" x2="51" y2="16"
        stroke="white"
        stroke-width="3"
        stroke-linecap="round"
        opacity="0.45"/>
</svg>
